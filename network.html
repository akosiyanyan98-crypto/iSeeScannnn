// render function
function renderProblems(list){
    let container = document.getElementById("content");
    container.innerHTML = "";

    list.forEach((p, index) => {
        container.innerHTML += `
        <div class="problem" onclick="toggleSolution(${index})">
            <h3>${p[0]}</h3>

            <div class="solution" id="sol-${index}">
                <p><b>Solution:</b> ${p[1]}</p>
                <div class="tutorial">${p[2].replace(/\n/g,"<br>")}</div>
            </div>
        </div>
        `;
    });
}

// toggle solution open/close
function toggleSolution(index){
    let sol = document.getElementById("sol-" + index);
    sol.style.display = (sol.style.display === "block") ? "none" : "block";
}

// SEARCH FUNCTION (THIS IS WHAT YOU WERE MISSING)
function searchProblem(){
    let input = document.getElementById("searchBar").value.toLowerCase();

    let filtered = softwareProblems.filter(p =>
        p[0].toLowerCase().includes(input) ||
        p[1].toLowerCase().includes(input)
    );

    renderProblems(filtered);
}

// initial load
renderProblems(networkProblems);

function displayProblems(list){
    let output="";


list.forEach((item,index)=>{


let tutorialSteps = item[2]
.split("\n")
.map(step=>{

return "<p>" + step + "</p>";

})
.join("");



output += `
        <div class="problem" onclick="showSolution(${index})">
            <h3>${index+1}. ${item[0]}</h3>

            <div class="solution" id="solution-${index}">
                <p><b>Solution:</b><br>${item[1]}</p>

                <div class="separator"></div>

                <p class="tutorial">
                    <b>Tutorial:</b><br>
                    ${tutorialSteps}
                </p>
            </div>
        </div>
        `;
    });

    document.getElementById("content").innerHTML = output;
}

function showSolution(id){
    let box = document.getElementById("solution-"+id);
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function searchProblem(){
    let search = document.getElementById("searchBar").value.toLowerCase();

    let filtered = networkProblems.filter(p =>
        p[0].toLowerCase().includes(search)
    );

    displayProblems(filtered);
}

displayProblems(networkProblems);
